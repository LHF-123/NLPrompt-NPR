DATASET:
  NAME: "WebBird"      # dataset registry name
  NUM_SHOTS: -1        # images per class; -1 means full training set
  NOISE_LABEL: False   # disable synthetic noise for WebFG
  NOISE_RATE: 0.0      # used only when NOISE_LABEL=True
  NOISE_TYPE: "real"   # record real web noise
  num_class: 200       # number of web-bird classes
  USE_OT: True         # enable OT clean/noisy split
  REG_E: 0.005         # OT entropy regularization; try 0.001/0.005/0.01
